# Smithery configuration for Toolstem Financial Intelligence MCP server.
# Remote server hosted on Apify's MCP gateway; users bring their own Apify
# token for authentication and Pay-Per-Event billing ($5 / 1,000 queries).
# Reference: https://smithery.ai/docs/build/session-config
startCommand:
  type: http
  url: https://mcp.apify.com/?tools=toolstem/toolstem-mcp-server
  configSchema:
    type: object
    required:
      - apifyToken
    properties:
      apifyToken:
        type: string
        format: password
        title: Apify API Token
        description: >-
          Your personal Apify API token. Usage is billed to your Apify
          account at $5 per 1,000 queries via Pay-Per-Event. Create a free
          Apify account and grab a token at
          https://console.apify.com/account/integrations
        x-from:
          header: apify-token
        x-to:
          query: token
