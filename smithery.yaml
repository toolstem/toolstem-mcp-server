# Smithery configuration file: https://smithery.ai/docs/config
#
# Remote MCP server hosted on Apify. The stdio/local path has been
# removed intentionally — Toolstem Financial Data is distributed only
# as a hosted service via Apify's pay-per-event billing.
startCommand:
  type: http
  url: https://mcp.apify.com/?tools=toolstem/toolstem-mcp-server
  configSchema:
    type: object
    required:
      - apifyToken
    properties:
      apifyToken:
        type: string
        description: >-
          Apify API token. Create one in Apify Console → Settings →
          Integrations. Billing for Toolstem Financial Data runs through
          your Apify account (pay-per-event).
    additionalProperties: false
  headers:
    Authorization: "Bearer {{config.apifyToken}}"
